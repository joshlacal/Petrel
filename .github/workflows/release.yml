name: Petrel release gates

'on':
  pull_request:
  push:
    branches: [main]
    tags: ['*.*.*']
  workflow_dispatch:

permissions:
  contents: read

env:
  EXPECTED_RELEASE_VERSION: '0.2.0'

concurrency:
  group: petrel-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  macos:
    name: macOS release gate (${{ matrix.lane }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - lane: minimum
            runner: macos-15
            selection: pinned-minimum
            evidence-class: stable-release
            developer-dir: /Applications/Xcode_16.0.app/Contents/Developer
            xcode-version: '16.0'
            xcode-build: 16A242d
            deployment-target: '18.0'
            ios-runtime: '18.0'
            watchos-runtime: '11.0'
            tvos-runtime: '18.0'
            visionos-runtime: '2.0'
          - lane: newest-stable
            runner: macos-26
            selection: official-runner-inventory
            evidence-class: stable-release
            developer-dir: /Applications/Xcode_26.6.app/Contents/Developer
            xcode-version: '26.6'
            xcode-build: 17F113
            deployment-target: '18.0'
            ios-runtime: '26.5'
            watchos-runtime: '26.5'
            tvos-runtime: '26.5'
            visionos-runtime: '26.5'
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Verify release workflow topology
        shell: bash
        run: |
          Scripts/verify-release-workflow-topology.sh
          Tests/ReleaseScripts/workflow-topology-negative-test.sh
          Tests/ReleaseScripts/owned-warning-gate-test.sh
          Tests/ReleaseScripts/install-generated-documentation-test.sh
          Scripts/tests/validate-documentation-contract.sh
          Tests/ReleaseScripts/release-documentation-gate-test.sh
          Tests/ReleaseScripts/release-tag-ancestry-gate-test.sh
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        id: release-python
        with:
          python-version: '3.12'
          update-environment: false
      - name: Select and verify stable Xcode
        shell: bash
        run: |
          set -euo pipefail
          export RELEASE_PYTHON312='${{ steps.release-python.outputs.python-path }}'
          test -x "$RELEASE_PYTHON312"
          export RELEASE_TOOLCHAIN_LANE='${{ matrix.lane }}'
          export RELEASE_TOOLCHAIN_SELECTION='${{ matrix.selection }}'
          export RELEASE_EVIDENCE_CLASS='${{ matrix.evidence-class }}'
          export RELEASE_DEVELOPER_DIR='${{ matrix.developer-dir }}'
          export RELEASE_XCODE_VERSION='${{ matrix.xcode-version }}'
          export RELEASE_XCODE_BUILD='${{ matrix.xcode-build }}'
          export RELEASE_IOS_RUNTIME='${{ matrix.ios-runtime }}'
          export RELEASE_WATCHOS_RUNTIME='${{ matrix.watchos-runtime }}'
          export RELEASE_TVOS_RUNTIME='${{ matrix.tvos-runtime }}'
          export RELEASE_VISIONOS_RUNTIME='${{ matrix.visionos-runtime }}'
          source Scripts/activate-release-toolchain.sh
          test "$("$RELEASE_XCRUN" --sdk iphonesimulator --show-sdk-version)" = "$RELEASE_IOS_RUNTIME"
          for name in RELEASE_PYTHON312 RELEASE_TOOLCHAIN_LANE RELEASE_TOOLCHAIN_SELECTION \
            RELEASE_EVIDENCE_CLASS RELEASE_DEVELOPER_DIR RELEASE_XCODE_VERSION \
            RELEASE_XCODE_BUILD RELEASE_IOS_RUNTIME RELEASE_WATCHOS_RUNTIME RELEASE_TVOS_RUNTIME \
            RELEASE_VISIONOS_RUNTIME DEVELOPER_DIR RELEASE_SWIFT RELEASE_XCODEBUILD RELEASE_XCRUN \
            RELEASE_MINT MINT_PATH MINT_LINK_PATH; do
            printf '%s=%s\n' "$name" "${!name}" >> "$GITHUB_ENV"
          done
          printf '%s\n' "$RELEASE_DEVELOPER_DIR/Toolchains/XcodeDefault.xctoolchain/usr/bin" >> "$GITHUB_PATH"
      - name: Bootstrap locked generator and release tools
        shell: bash
        run: |
          set -euo pipefail
          Scripts/bootstrap-generator-environment.sh
          Scripts/verify-generator-environment.sh
          PETREL_PYTHON="$GITHUB_WORKSPACE/.build/release-generator-venv/bin/python"
          test -x "$PETREL_PYTHON"
          printf 'PETREL_PYTHON=%s\n' "$PETREL_PYTHON" >> "$GITHUB_ENV"
          Scripts/bootstrap-release-tools.sh
      - name: Run generator tests and verify deterministic projection
        shell: bash
        run: |
          set -euo pipefail
          "$PETREL_PYTHON" -m unittest discover -s generator/tests -v
          "$PETREL_PYTHON" -m compileall -q generator
          Scripts/regenerate-generated.sh
          Scripts/regenerate-generated.sh
          git diff --exit-code -- Sources/Petrel/Generated
          test -z "$(git status --porcelain --untracked-files=all -- Sources/Petrel/Generated)"
      - name: Validate documentation and compile public examples
        shell: bash
        run: Scripts/validate-documentation.sh
      - name: Diagnose API compatibility against exact 0.1.0
        shell: bash
        run: Scripts/run-api-compatibility.sh --current-git-checkout --breakage-allowlist-path api-breakage-allowlist.txt
      - name: Build, test, and reject package-owned warnings
        shell: bash
        run: |
          set -euo pipefail
          Scripts/verify-owned-warnings.sh debug-build -- "$RELEASE_SWIFT" build
          Scripts/verify-owned-warnings.sh tests -- "$RELEASE_SWIFT" test
          Scripts/verify-owned-warnings.sh dag-cbor-bridge -- \
            "$RELEASE_SWIFT" test --filter DAGCBORJSONBridgeTests
          Scripts/verify-owned-warnings.sh release-build -- "$RELEASE_SWIFT" build -c release
          Scripts/verify-owned-warnings.sh ios-simulator -- "$RELEASE_XCODEBUILD" \
            -scheme Petrel \
            -destination 'generic/platform=iOS Simulator' \
            build

  linux:
    name: Linux release gate
    runs-on: ubuntu-24.04
    container: swift:6.0.3-jammy@sha256:f0bfe313779a0bb99db87f97c88ea6ada014aa6b3359f9c5583bf70b0b721217
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install system dependencies
        run: apt-get update && apt-get install -y libsecret-1-dev libglib2.0-dev pkg-config
      - name: Verify pinned Swift
        shell: bash
        run: |
          set -euo pipefail
          RELEASE_SWIFT=$(command -v swift)
          [[ $RELEASE_SWIFT == /* ]]
          test "$("$RELEASE_SWIFT" --version | head -n 1)" = 'Swift version 6.0.3 (swift-6.0.3-RELEASE)'
          printf 'RELEASE_SWIFT=%s\n' "$RELEASE_SWIFT" >> "$GITHUB_ENV"
      - name: Build, test, and reject package-owned warnings
        shell: bash
        run: |
          set -euo pipefail
          Scripts/verify-owned-warnings.sh debug-build -- "$RELEASE_SWIFT" build
          Scripts/verify-owned-warnings.sh tests -- "$RELEASE_SWIFT" test
          Scripts/verify-owned-warnings.sh dag-cbor-bridge -- \
            "$RELEASE_SWIFT" test --filter DAGCBORJSONBridgeTests
          Scripts/verify-owned-warnings.sh release-build -- "$RELEASE_SWIFT" build -c release

  tagged-clean-consumer:
    name: Tagged clean URL consumer
    needs: [macos, linux]
    if: "${{ startsWith(github.ref, 'refs/tags/') }}"
    runs-on: macos-15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Validate exact release tag
        shell: bash
        run: |
          set -euo pipefail
          [[ $GITHUB_REF_NAME =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]
          test "$GITHUB_REF_NAME" = "$EXPECTED_RELEASE_VERSION"
          CANDIDATE_COMMIT=$(/usr/bin/git rev-parse HEAD)
          test "$(/usr/bin/git rev-parse "$GITHUB_REF_NAME^{commit}")" = "$CANDIDATE_COMMIT"
          /usr/bin/git show-ref --verify --quiet refs/remotes/origin/main
          /usr/bin/git merge-base --is-ancestor "$CANDIDATE_COMMIT" refs/remotes/origin/main
          printf 'CANDIDATE_COMMIT=%s\n' "$CANDIDATE_COMMIT" >> "$GITHUB_ENV"
      - name: Select and verify minimum stable Xcode
        shell: bash
        run: |
          set -euo pipefail
          export RELEASE_TOOLCHAIN_LANE=minimum
          export RELEASE_TOOLCHAIN_SELECTION=pinned-minimum
          export RELEASE_EVIDENCE_CLASS=stable-release
          export RELEASE_DEVELOPER_DIR=/Applications/Xcode_16.0.app/Contents/Developer
          export RELEASE_XCODE_VERSION=16.0
          export RELEASE_XCODE_BUILD=16A242d
          export RELEASE_IOS_RUNTIME=18.0
          export RELEASE_WATCHOS_RUNTIME=11.0
          export RELEASE_TVOS_RUNTIME=18.0
          export RELEASE_VISIONOS_RUNTIME=2.0
          source Scripts/activate-release-toolchain.sh
          test "$("$RELEASE_XCRUN" --sdk iphonesimulator --show-sdk-version)" = "$RELEASE_IOS_RUNTIME"
          for name in RELEASE_TOOLCHAIN_LANE RELEASE_TOOLCHAIN_SELECTION RELEASE_EVIDENCE_CLASS \
            RELEASE_DEVELOPER_DIR RELEASE_XCODE_VERSION RELEASE_XCODE_BUILD RELEASE_IOS_RUNTIME \
            RELEASE_WATCHOS_RUNTIME RELEASE_TVOS_RUNTIME RELEASE_VISIONOS_RUNTIME DEVELOPER_DIR \
            RELEASE_SWIFT RELEASE_XCODEBUILD RELEASE_XCRUN; do
            printf '%s=%s\n' "$name" "${!name}" >> "$GITHUB_ENV"
          done
          printf '%s\n' "$RELEASE_DEVELOPER_DIR/Toolchains/XcodeDefault.xctoolchain/usr/bin" >> "$GITHUB_PATH"
      - name: Resolve and build exact public coordinate
        shell: bash
        run: |
          set -euo pipefail
          TMP=$(mktemp -d)
          trap 'rm -rf "$TMP"' EXIT
          cp -R Tests/ReleaseConsumers/PetrelURLConsumer "$TMP/consumer"
          mkdir -p \
            "$TMP/home" \
            "$TMP/xdg-cache" \
            "$TMP/swiftpm-cache" \
            "$TMP/swiftpm-config" \
            "$TMP/swiftpm-security" \
            "$TMP/swiftpm-module-cache" \
            "$TMP/clang-module-cache"
          test ! -e "$TMP/consumer/Package.resolved"
          test ! -e "$TMP/consumer/.swiftpm/configuration/mirrors.json"
          test ! -e "$TMP/home/.swiftpm/configuration/mirrors.json"
          test -z "$(find "$TMP/swiftpm-config" -mindepth 1 -print -quit)"
          grep -F '.package(url: "https://github.com/joshlacal/Petrel.git", exact: "0.2.0")' \
            "$TMP/consumer/Package.swift" >/dev/null
          test -z "$(grep -E '\.package\(path:' "$TMP/consumer/Package.swift" || true)"
          test -z "$(env HOME="$TMP/home" XDG_CACHE_HOME="$TMP/xdg-cache" \
            GIT_CONFIG_GLOBAL=/dev/null GIT_CONFIG_NOSYSTEM=1 \
            git config --global --get-regexp '^url\..*\.insteadof$' 2>/dev/null || true)"
          env HOME="$TMP/home" \
            XDG_CACHE_HOME="$TMP/xdg-cache" \
            SWIFTPM_MODULECACHE_OVERRIDE="$TMP/swiftpm-module-cache" \
            CLANG_MODULE_CACHE_PATH="$TMP/clang-module-cache" \
            GIT_CONFIG_GLOBAL=/dev/null \
            GIT_CONFIG_NOSYSTEM=1 \
            "$RELEASE_SWIFT" package \
              --package-path "$TMP/consumer" \
              --cache-path "$TMP/swiftpm-cache" \
              --config-path "$TMP/swiftpm-config" \
              --security-path "$TMP/swiftpm-security" \
              --scratch-path "$TMP/scratch" \
              --disable-netrc \
              resolve
          PACKAGE_RESOLVED="$TMP/consumer/Package.resolved" /usr/bin/ruby <<'RUBY'
          require "json"

          resolved = JSON.parse(File.binread(ENV.fetch("PACKAGE_RESOLVED")))
          pins = resolved.fetch("pins").select do |pin|
            pin["identity"] == "petrel" &&
              pin["location"] == "https://github.com/joshlacal/Petrel.git"
          end
          abort "expected exactly one Petrel URL pin" unless pins.length == 1
          state = pins.fetch(0).fetch("state")
          abort "Petrel version does not match the guarded release tag" unless
            state.fetch("version") == ENV.fetch("EXPECTED_RELEASE_VERSION")
          abort "Petrel revision does not match the checked-out tag commit" unless
            state.fetch("revision") == ENV.fetch("CANDIDATE_COMMIT")
          RUBY
          env HOME="$TMP/home" \
            XDG_CACHE_HOME="$TMP/xdg-cache" \
            SWIFTPM_MODULECACHE_OVERRIDE="$TMP/swiftpm-module-cache" \
            CLANG_MODULE_CACHE_PATH="$TMP/clang-module-cache" \
            GIT_CONFIG_GLOBAL=/dev/null \
            GIT_CONFIG_NOSYSTEM=1 \
            "$RELEASE_SWIFT" build \
              --package-path "$TMP/consumer" \
              --cache-path "$TMP/swiftpm-cache" \
              --config-path "$TMP/swiftpm-config" \
              --security-path "$TMP/swiftpm-security" \
              --scratch-path "$TMP/scratch" \
              --disable-netrc
          test ! -e "$TMP/swiftpm-config/mirrors.json"
