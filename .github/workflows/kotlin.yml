name: Kotlin

on:
  push:
    branches: [main, restructure]
    paths: ['petrel-kotlin/**', '.github/workflows/kotlin.yml']
  pull_request:
    paths: ['petrel-kotlin/**', '.github/workflows/kotlin.yml']

concurrency:
  group: kotlin-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
      - name: Build
        run: ./gradlew -p petrel-kotlin build
