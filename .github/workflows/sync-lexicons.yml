name: Sync lexicons from upstream

on:
  schedule:
    - cron: '17 6 * * 1'   # weekly, Monday 06:17 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    name: Sync and open PR
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        id: release-python
        with:
          python-version: '3.12'
          update-environment: false
      - name: Select and verify stable release toolchain
        shell: bash
        run: |
          set -euo pipefail
          export RELEASE_PYTHON312="${{ steps.release-python.outputs.python-path }}"
          test -x "$RELEASE_PYTHON312"
          export RELEASE_TOOLCHAIN_LANE=newest-stable
          export RELEASE_TOOLCHAIN_SELECTION=official-runner-inventory
          export RELEASE_EVIDENCE_CLASS=stable-release
          export RELEASE_DEVELOPER_DIR=/Applications/Xcode_26.6.app/Contents/Developer
          export RELEASE_XCODE_VERSION=26.6
          export RELEASE_XCODE_BUILD=17F113
          export RELEASE_IOS_RUNTIME=26.5
          export RELEASE_WATCHOS_RUNTIME=26.5
          export RELEASE_TVOS_RUNTIME=26.5
          export RELEASE_VISIONOS_RUNTIME=26.5
          source Scripts/activate-release-toolchain.sh
          printf 'RELEASE_PYTHON312=%s\n' "$RELEASE_PYTHON312" >> "$GITHUB_ENV"
          printf 'DEVELOPER_DIR=%s\n' "$DEVELOPER_DIR" >> "$GITHUB_ENV"
          printf 'RELEASE_SWIFT=%s\n' "$RELEASE_SWIFT" >> "$GITHUB_ENV"
          printf 'RELEASE_XCODEBUILD=%s\n' "$RELEASE_XCODEBUILD" >> "$GITHUB_ENV"
          printf 'RELEASE_XCRUN=%s\n' "$RELEASE_XCRUN" >> "$GITHUB_ENV"
          printf 'RELEASE_MINT=%s\n' "$RELEASE_MINT" >> "$GITHUB_ENV"
          printf 'MINT_PATH=%s\n' "$MINT_PATH" >> "$GITHUB_ENV"
          printf 'MINT_LINK_PATH=%s\n' "$MINT_LINK_PATH" >> "$GITHUB_ENV"
          dirname "$RELEASE_SWIFT" >> "$GITHUB_PATH"
      - name: Bootstrap locked generator and release tools
        shell: bash
        run: |
          set -euo pipefail
          Scripts/bootstrap-generator-environment.sh
          Scripts/verify-generator-environment.sh
          PETREL_PYTHON="$GITHUB_WORKSPACE/.build/release-generator-venv/bin/python"
          test -x "$PETREL_PYTHON"
          printf 'PETREL_PYTHON=%s\n' "$PETREL_PYTHON" >> "$GITHUB_ENV"
          Scripts/bootstrap-release-tools.sh
      - name: Fetch upstream lexicons
        shell: bash
        run: |
          set -euo pipefail
          git clone --depth 1 --filter=blob:none --sparse https://github.com/bluesky-social/atproto.git /tmp/atproto
          git -C /tmp/atproto sparse-checkout set lexicons
      - name: Sync standard namespaces
        shell: bash
        run: |
          set -euo pipefail
          for ns in app chat com tools; do
            rsync -a --delete "/tmp/atproto/lexicons/$ns/" "generator/lexicons/$ns/"
          done
      - name: Regenerate the Swift projection
        shell: bash
        run: |
          set -euo pipefail
          "$PETREL_PYTHON" run.py \
            --manifest generator/manifests/petrel-core.json \
            --language swift
          "$RELEASE_MINT" run --executable swiftformat nicklockwood/SwiftFormat@0.61.1 \
            Sources/Petrel/Generated
      - name: Open PR if changed
        uses: peter-evans/create-pull-request@v7
        with:
          branch: bot/sync-lexicons
          title: 'Sync lexicons from bluesky-social/atproto'
          commit-message: 'Sync standard lexicons from upstream + regenerate'
          add-paths: |
            generator/lexicons/**
            Sources/Petrel/Generated/**
          body: |
            Automated weekly sync of `app`, `chat`, `com`, `tools` lexicon namespaces
            from [bluesky-social/atproto](https://github.com/bluesky-social/atproto),
            followed by regeneration of the closed Swift projection and SwiftFormat.

            Review the generated-code diff before merging.
