name: Build and Deploy DocC Documentation

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
  workflow_run:
    workflows: ["Generate Swift Code"]
    types:
      - completed

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-docs:
    runs-on: macos-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name != 'workflow_run' }}
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Verify Xcode-provided Swift toolchain
      run: xcrun swift --version
        
    - name: Clean Package Cache
      run: |
        xcrun swift package clean
        
    - name: Build Documentation
      run: |
        xcrun swift package \
          --allow-writing-to-directory "$GITHUB_WORKSPACE/docs-new" \
          generate-documentation \
          --target Petrel \
          --transform-for-static-hosting \
          --hosting-base-path Petrel \
          --output-path "$GITHUB_WORKSPACE/docs-new"
          
    - name: Update docs directory
      run: |
        rm -rf docs/*
        cp -r "$GITHUB_WORKSPACE/docs-new/"* docs/
        rm -rf "$GITHUB_WORKSPACE/docs-new"
        
    - name: Commit documentation updates
      if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add docs/
        if git diff --staged --quiet; then
          echo "No documentation changes to commit"
        else
          git commit -m "Update DocC documentation

          🤖 Generated with [Claude Code](https://claude.ai/code)
          
          Co-Authored-By: Claude <noreply@anthropic.com>"
          git push
        fi
