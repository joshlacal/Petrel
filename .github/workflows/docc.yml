name: Validate DocC Documentation

'on':
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docc-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-docs:
    name: Validate documentation (read-only)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Select and verify minimum stable Xcode
        shell: bash
        run: |
          set -euo pipefail
          export RELEASE_TOOLCHAIN_LANE=minimum
          export RELEASE_TOOLCHAIN_SELECTION=pinned-minimum
          export RELEASE_EVIDENCE_CLASS=stable-release
          export RELEASE_DEVELOPER_DIR=/Applications/Xcode_16.0.app/Contents/Developer
          export RELEASE_XCODE_VERSION=16.0
          export RELEASE_XCODE_BUILD=16A242d
          export RELEASE_IOS_RUNTIME=18.0
          export RELEASE_WATCHOS_RUNTIME=11.0
          export RELEASE_TVOS_RUNTIME=18.0
          export RELEASE_VISIONOS_RUNTIME=2.0
          source Scripts/activate-release-toolchain.sh
          for name in RELEASE_TOOLCHAIN_LANE RELEASE_TOOLCHAIN_SELECTION RELEASE_EVIDENCE_CLASS \
            RELEASE_DEVELOPER_DIR RELEASE_XCODE_VERSION RELEASE_XCODE_BUILD RELEASE_IOS_RUNTIME \
            RELEASE_WATCHOS_RUNTIME RELEASE_TVOS_RUNTIME RELEASE_VISIONOS_RUNTIME DEVELOPER_DIR \
            RELEASE_SWIFT RELEASE_XCODEBUILD RELEASE_XCRUN; do
            printf '%s=%s\n' "$name" "${!name}" >> "$GITHUB_ENV"
          done
      - name: Validate documentation with warnings as errors
        shell: bash
        run: Scripts/validate-documentation.sh
